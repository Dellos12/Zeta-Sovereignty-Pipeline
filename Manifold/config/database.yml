default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  port: 5432
  username: <%= ENV.fetch("DB_USER") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "password" } %>

development:
  <<: *default
  database: manifold_development

test:
  <<: *default
  database: manifold_test

production:
  # Base Principal (Onde mora a Auditoria Zeta)
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DB_NAME") { "manifold_production" } %>

  # Sincronizando todas as frentes do Rails 8.1
  cable:
    <<: *primary_production
  queue:
    <<: *primary_production
  cache:
    <<: *primary_production

