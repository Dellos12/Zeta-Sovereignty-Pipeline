
services:
  # 1. O HIPERPLANO (Banco Vetorial - pgvector)
  db_vector:
    image: ankane/pgvector
    container_name: db_vector
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: manifold_development
    ports:
      - "5432:5432"
    networks:
      - ressonancia_net
    profiles: ["pipeline"]

  # 2. O PULSO (Mensageria RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ressonancia_net
    profiles: ["pipeline"]

  # 3. MEMÓRIA DE CURTO PRAZO (Redis)
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - ressonancia_net
    profiles: ["pipeline"]

  # 4. O COLISOR (Motor de Geometria da Informação)
  engine_python:
    build: 
      context: ./engine_python
      dockerfile: Dockerfile
    container_name: engine_python
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    volumes:
      - ./engine_python:/app
      - ./shared_data:/app/shared_data
    stdin_open: true
    tty: true
    depends_on:
      - db_vector
      - redis
    networks:
      - ressonancia_net
    profiles: ["pipeline"]

  # 5. O TRANSPORTADOR (Interface Mundo Real / gRPC / Web)
  transport_go:
    build: 
      context: ./transport_go
      dockerfile: Dockerfile
    container_name: transport_go
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - ./shared_data:/app/shared_data
    depends_on:
      - redis
    networks:
      - ressonancia_net
    profiles: ["pipeline"]

  # 6. O COLISOR DE PARTÍCULAS (Envoy Proxy)
  envoy:
    image: envoyproxy/envoy:v1.28-latest
    container_name: envoy
    volumes:
      - ./infra/envoy/envoy.yaml:/etc/envoy/envoy.yaml
    ports:
      - "10000:10000"
    networks:
      - ressonancia_net
    profiles: ["pipeline"]

  # 7. O AUDITOR SUPREMO (Jenkins com Injeção de LUA)
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    privileged: true
    user: root
    ports:
      - "8081:8080" 
      - "50000:50000"
    command: >
      sh -c "apt-get update && apt-get install -y lua5.3 && 
             ln -sf /usr/bin/lua5.3 /usr/bin/lua && 
             /usr/bin/tini -- /usr/local/bin/jenkins.sh"
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /usr/libexec/docker/cli-plugins/docker-compose:/usr/bin/docker-compose
    networks:
      - ressonancia_net
    profiles: ["jenkins"]

networks:
  ressonancia_net:
    driver: bridge
