services:
  # 1. Banco Vetorial (pgvector)
  db_vector:
    image: ankane/pgvector
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: manifold_development
    ports:
      - "5432:5432"
    networks:
      - ressonancia_net
    profiles: ["pipeline"]

  # 2. RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ressonancia_net
    profiles: ["pipeline"]

  # 3. Redis
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - ressonancia_net
    profiles: ["pipeline"]

  # 4. Engine Python
  engine_python:
    build: 
      context: ./engine_python
      dockerfile: Dockerfile
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    volumes:
      - ./engine_python:/app
      - ./shared_data:/app/shared_data
      - ../projeto_ricci_vision/output:/app/shared_data/sensor_input
    stdin_open: true
    tty: true
    depends_on:
      - db_vector
      - redis
    networks:
      - ressonancia_net
    profiles: ["pipeline"]

  # 5. Transport Go
  transport_go:
    build: 
      context: ./transport_go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - ./shared_data:/app/shared_data
    depends_on:
      - redis
    networks:
      - ressonancia_net
    profiles: ["pipeline"]

  # 6. Envoy Proxy
  envoy:
    image: envoyproxy/envoy:v1.28-latest
    volumes:
      - /workspace/infra/envoy:/etc/envoy/config
    command: -c /etc/envoy/config/envoy.yaml 
    ports:
      - "10000:10000"
    networks:
      - ressonancia_net
    profiles: ["pipeline"]

  # 7. Jenkins (Mantemos o nome fixo aqui para facilitar seu acesso)
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    privileged: true
    user: root
    ports:
      - "8081:8080" 
      - "50000:50000"
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins
      - /home/devildev/ESTRUTURA_RESSONANCIA:/workspace
    networks:
      - ressonancia_net
    profiles: ["jenkins"]

  # 8. Aplicação Rails (Manifold) - SEM PROFILE para o Jenkins gerenciar
  manifold_app:
    build:
      context: ./Manifold
      dockerfile: Dockerfile
    environment:
      - SECRET_KEY_BASE=985a78449a9aae6915132f82beb29355399444bb33925abf80679a72c572d99673a8a390ebca8d48a6a78d531b5264cb5e48b6f2e1cf5996b8140d0505450efb
      - RAILS_ENV=production
      - DB_HOST=db_vector
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=manifold_development
      - REDIS_URL=redis://redis:6379/1
    volumes:
      - ./Manifold:/rails
      - ./shared_data:/app/shared_data
    depends_on:
      - db_vector
      - redis
    networks:
      - ressonancia_net
    ports:
      - "3000:3000"

# --- BLOCO OBRIGATÓRIO PARA RESOLVER O ERRO DE UNDEFINED NETWORK ---
networks:
  ressonancia_net:
    name: ressonancia_net
    driver: bridge

